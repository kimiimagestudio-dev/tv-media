<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park - TV MEDIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html, body { 
      width: 100%; height: 100%; 
      background: #000; overflow: hidden; 
      cursor: none; 
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* CONTAINER UTAMA: FULL 1080P */
    .screen-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO FULL SCREEN (DI TIMPA TEKS) */
    #video-slot {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill; /* Paksa 1920x1080 */
      z-index: 1;
    }

    /* TOMBOL FULLSCREEN SANGAT JELAS */
    #btn-control {
      position: absolute;
      top: 20px; left: 20px;
      width: 65px; height: 65px;
      background: #00468b; /* Biru Easton kontras */
      border: 3px solid #ffffff;
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .icon { fill: white; width: 40px; height: 40px; display: none; }
    .show { display: block; }

    /* RUNNING TEXT ROUNDED (OVERLAY/MENIMPA VIDEO) */
    .overlay-ticker {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      width: 94%;
      height: 65px;
      background: rgba(0, 0, 0, 0.85); /* Hitam pekat transparan */
      backdrop-filter: blur(5px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 100px; /* Rounded Sempurna */
      display: flex; align-items: center;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* ANIMASI SEAMLESS TANPA JEDA */
    .marquee-container {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      animation: seamless-scroll 18s linear infinite;
    }

    .ticker-text {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding-right: 150px; /* Space antar teks */
      display: inline-block;
    }

    @keyframes seamless-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); } /* Geser tepat setengah konten */
    }
  </style>
</head>
<body>

  <div id="btn-control" onclick="handleFS()">
    <svg id="icon-fs" class="icon show" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    <svg id="icon-exit" class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </div>

  <div class="screen-wrapper">
    <video id="video-slot" muted playsinline loop></video>

    <div class="overlay-ticker">
      <div class="marquee-container">
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
      </div>
    </div>
  </div>

<script>
  const VIDEO_URL = "https://github.com/kimiimagestudio-dev/tv-media/raw/refs/heads/main/redpandacompress_TESTING%20TV%20MEDIA%20(4).mp4";
  const v = document.getElementById('video-slot');
  const iconFs = document.getElementById('icon-fs');
  const iconExit = document.getElementById('icon-exit');

  function handleFS() {
    if (!document.fullscreenElement) {
      const doc = document.documentElement;
      if (doc.requestFullscreen) doc.requestFullscreen();
      else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
      
      v.src = VIDEO_URL + "?v=" + new Date().getTime();
      v.play();
      
      iconFs.classList.remove('show');
      iconExit.classList.add('show');
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      iconExit.classList.remove('show');
      iconFs.classList.add('show');
    }
  }

  // AUTO REFRESH INSTAN 2 DETIK
  let lastTag = "";
  function checkUpdate() {
    fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
      .then(res => {
        const currentTag = res.headers.get("Last-Modified") || res.headers.get("ETag");
        if (lastTag && currentTag && lastTag !== currentTag) location.reload(true);
        lastTag = currentTag;
      }).catch(() => {});
  }

  setInterval(checkUpdate, 2000);
  
  window.onload = () => {
    checkUpdate();
    v.src = VIDEO_URL;
  };
</script>
</body>
</html>
