<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park - Seamless Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html, body { 
      width: 100%; height: 100%; 
      background: #000; overflow: hidden; 
      cursor: none; 
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    .screen-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO FULL 1080P */
    #video-slot {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 1;
    }

    /* RUNNING TEXT ULTRA TRANSPARENT & BOTTOM */
    .overlay-ticker {
      position: absolute;
      bottom: 10px; /* Mentok bawah */
      left: 0;
      width: 100%;
      height: 45px;
      /* Background lebih transparan (0.4) */
      background: rgba(0, 0, 0, 0.4); 
      display: flex; align-items: center;
      overflow: hidden;
      z-index: 10;
    }

    /* ANIMASI SEAMLESS TANPA PUTUS */
    .marquee-container {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      /* Durasi 20 detik untuk kehalusan jalan teks */
      animation: seamless-scroll 20s linear infinite;
    }

    .ticker-text {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      /* Space antar teks agar rapi */
      padding-right: 100px; 
      display: inline-block;
    }

    @keyframes seamless-scroll {
      0% { transform: translateX(0); }
      /* Geser tepat ke titik awal duplikasi */
      100% { transform: translateX(-50%); } 
    }
  </style>
</head>
<body onclick="startDisplay()">

  <div class="screen-wrapper">
    <video id="video-slot" muted playsinline loop></video>

    <div class="overlay-ticker">
      <div class="marquee-container">
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
      </div>
    </div>
  </div>

<script>
  const VIDEO_URL = "reminder%20(30%20x%2020%20cm)-2.mp4";
  const v = document.getElementById('video-slot');

  function startDisplay() {
    // Paksa Fullscreen
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    
    // Putar Video
    v.src = VIDEO_URL + "?v=" + new Date().getTime();
    v.play();
    
    document.body.onclick = null; 
  }

  // AUTO REFRESH INSTAN 2 DETIK
  let lastUpdateTag = "";
  function checkUpdate() {
    fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
      .then(res => {
        const currentTag = res.headers.get("Last-Modified") || res.headers.get("ETag");
        if (lastUpdateTag && currentTag && lastUpdateTag !== currentTag) {
          location.reload(true); 
        }
        lastUpdateTag = currentTag;
      }).catch(() => {});
  }

  setInterval(checkUpdate, 2000);
  
  window.onload = () => {
    checkUpdate();
    v.src = VIDEO_URL;
    v.play().catch(() => {
      console.log("Menunggu interaksi user...");
    });
  };
</script>
</body>
</html>
