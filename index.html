<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park - Seamless Display Rounded</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html, body { 
      width: 100%; height: 100%; 
      background: #000; overflow: hidden; 
      cursor: none; 
      font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    }

    .screen-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* VIDEO FULL SCREEN */
    #video-slot {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill; /* Paksa memenuhi layar 1080p */
      z-index: 1;
    }

    /* RUNNING TEXT ROUNDED & GLASSMORPHISM */
    .overlay-ticker {
      position: absolute;
      bottom: 25px; /* Jarak dari bawah */
      left: 30px;   /* Jarak dari kiri */
      right: 30px;  /* Jarak dari kanan */
      height: 55px; /* Sedikit lebih tinggi agar teks leluasa */
      
      /* Efek Transparan & Blur (Kaca) */
      background: rgba(0, 0, 0, 0.45); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      
      /* Frame Rounded Sempurna */
      border-radius: 50px; 
      border: 1px solid rgba(255, 255, 255, 0.15); /* Garis tepi halus */
      
      display: flex; 
      align-items: center;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* ANIMASI SEAMLESS TANPA PUTUS */
    .marquee-container {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      /* Kecepatan 25 detik (sesuaikan jika teks terlalu panjang/pendek) */
      animation: seamless-scroll 25s linear infinite;
    }

    .ticker-text {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding-right: 200px; /* Jarak antar pengulangan teks */
      display: inline-block;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    @keyframes seamless-scroll {
      0% { transform: translateX(0); }
      /* Geser tepat ke titik awal duplikasi (50% dari total lebar container) */
      100% { transform: translateX(-50%); } 
    }
  </style>
</head>
<body onclick="startDisplay()">

  <div class="screen-wrapper">
    <video id="video-slot" muted playsinline loop></video>

    <div class="overlay-ticker">
      <div class="marquee-container">
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
      </div>
    </div>
  </div>

<script>
  // Nama file video disesuaikan dengan milik Anda
  const VIDEO_URL = "https://github.com/kimiimagestudio-dev/tv-media/raw/refs/heads/main/redpandacompress_TESTING%20TV%20MEDIA%20(4).mp4";
  const v = document.getElementById('video-slot');

  function startDisplay() {
    // Aktifkan Fullscreen
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    
    // Putar Video dengan cache buster agar selalu fresh
    v.src = VIDEO_URL + "?v=" + new Date().getTime();
    v.play();
    
    // Hapus event click setelah mulai
    document.body.onclick = null; 
  }

  // SISTEM AUTO REFRESH (Cek perubahan file setiap 2 detik)
  let lastUpdateTag = "";
  function checkUpdate() {
    fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
      .then(res => {
        const currentTag = res.headers.get("Last-Modified") || res.headers.get("ETag");
        if (lastUpdateTag && currentTag && lastUpdateTag !== currentTag) {
          location.reload(true); 
        }
        lastUpdateTag = currentTag;
      }).catch(() => {});
  }

  setInterval(checkUpdate, 2000);
  
  window.onload = () => {
    checkUpdate();
    v.src = VIDEO_URL;
    v.play().catch(() => {
      console.log("Menunggu interaksi user untuk mulai (klik layar)...");
    });
  };
</script>
</body>
</html>
