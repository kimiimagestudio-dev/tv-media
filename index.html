<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park - Seamless No Delay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

    .screen-wrapper { position: relative; width: 100vw; height: 100vh; }

    #video-slot {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: fill; z-index: 1;
    }

    /* CONTAINER UTAMA */
    .bottom-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
      align-items: center;
    }

    /* TICKER FRAME */
    .overlay-ticker {
      flex: 1;
      height: 35px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden; /* Potong teks yang keluar jalur */
      display: flex;
      align-items: center;
    }

    /* WRAPPER ANIMASI */
    .marquee-wrapper {
      display: flex;
      width: max-content; /* Biarkan melebar sesuai isi */
      animation: scroll-left 20s linear infinite;
    }

    .ticker-text {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      display: flex;
      align-items: center;
      line-height: 35px;
      padding-right: 50px; /* Jarak antar kalimat */
    }

    /* JAM DIGITAL */
    .digital-clock {
      min-width: 110px;
      height: 35px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      font-size: 16px;
      font-weight: 700;
    }

    /* LOGIKA SEAMLESS: 
       Kita geser -50% dari total lebar wrapper 
       karena isi wrapper adalah dua set teks yang identik */
    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body onclick="startDisplay()">

  <div class="screen-wrapper">
    <video id="video-slot" muted playsinline loop></video>

    <div class="bottom-controls">
      <div class="overlay-ticker">
        <div class="marquee-wrapper">
          <div class="ticker-text">
            <span>EASTON PARK RESIDENCE JATINANGOR</span>
            <span style="margin-left:50px;">EASTON PARK RESIDENCE JATINANGOR</span>
            <span style="margin-left:50px;">EASTON PARK RESIDENCE JATINANGOR</span>
          </div>
          <div class="ticker-text">
            <span>EASTON PARK RESIDENCE JATINANGOR</span>
            <span style="margin-left:50px;">EASTON PARK RESIDENCE JATINANGOR</span>
            <span style="margin-left:50px;">EASTON PARK RESIDENCE JATINANGOR</span>
          </div>
        </div>
      </div>

      <div id="clock" class="digital-clock">00:00:00</div>
    </div>
  </div>

<script>
  const VIDEO_URL = "https://github.com/kimiimagestudio-dev/tv-media/raw/refs/heads/main/redpandacompress_TESTING%20TV%20MEDIA%20(4).mp4";
  const v = document.getElementById('video-slot');

  function startDisplay() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    v.src = VIDEO_URL + "?v=" + new Date().getTime();
    v.play();
    document.body.onclick = null;
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB');
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Auto-refresh logic
  let lastUpdate = "";
  setInterval(() => {
    fetch(window.location.href, { method: 'HEAD' }).then(res => {
      let etag = res.headers.get("ETag") || res.headers.get("Last-Modified");
      if (lastUpdate && etag !== lastUpdate) location.reload();
      lastUpdate = etag;
    });
  }, 3000);

  window.onload = () => { v.src = VIDEO_URL; v.play().catch(()=>{}); };
</script>
</body>
</html>
