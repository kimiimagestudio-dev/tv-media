<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park - Clean Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html, body { 
      width: 100%; height: 100%; 
      background: #000; overflow: hidden; 
      cursor: none; 
      font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    }

    .screen-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video-slot {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      z-index: 1;
    }

    /* CONTAINER BAWAH UNTUK TICKER & JAM */
    .bottom-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 15px; /* Jarak antara ticker dan jam */
      align-items: center;
      z-index: 10;
    }

    /* RUNNING TEXT - VERSI KECIL & CLEAN */
    .overlay-ticker {
      flex: 1; /* Mengambil sisa ruang */
      height: 35px;
      background: rgba(0, 0, 0, 0.3); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .marquee-container {
      display: flex;
      white-space: nowrap;
      will-change: transform;
      animation: seamless-scroll 30s linear infinite; /* Lebih lambat & smooth */
    }

    .ticker-text {
      font-size: 16px; /* Ukuran lebih kecil */
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-right: 120px;
      display: inline-block;
    }

    /* JAM DIGITAL MINIMALIS */
    .digital-clock {
      width: 120px;
      height: 35px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: monospace; /* Angka tetap sejajar saat berubah */
    }

    @keyframes seamless-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); } 
    }
  </style>
</head>
<body onclick="startDisplay()">

  <div class="screen-wrapper">
    <video id="video-slot" muted playsinline loop></video>

    <div class="bottom-controls">
      <div class="overlay-ticker">
        <div class="marquee-container">
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        </div>
      </div>

      <div id="clock" class="digital-clock">00:00:00</div>
    </div>
  </div>

<script>
  const VIDEO_URL = "reminder%20(30%20x%2020%20cm)-2.mp4";
  const v = document.getElementById('video-slot');

  function startDisplay() {
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    v.src = VIDEO_URL + "?v=" + new Date().getTime();
    v.play();
    document.body.onclick = null; 
  }

  // UPDATE JAM REALTIME
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // CHECK UPDATE SERVER
  let lastUpdateTag = "";
  function checkUpdate() {
    fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
      .then(res => {
        const currentTag = res.headers.get("Last-Modified") || res.headers.get("ETag");
        if (lastUpdateTag && currentTag && lastUpdateTag !== currentTag) {
          location.reload(true); 
        }
        lastUpdateTag = currentTag;
      }).catch(() => {});
  }
  setInterval(checkUpdate, 2000);
  
  window.onload = () => {
    checkUpdate();
    v.src = VIDEO_URL;
    v.play().catch(() => {});
  };
</script>
</body>
</html>
