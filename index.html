<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Easton Park TV - Full Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; font-family: sans-serif; }

    .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }

    /* TOMBOL KONTROL POJOK KIRI ATAS */
    #btn-control {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 9999;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.3);
      opacity: 0.5; /* Agak transparan supaya clean */
    }
    #btn-control:hover { opacity: 1; background: rgba(255, 255, 255, 0.4); cursor: default; }
    
    /* Ikon SVG Fullscreen & Exit */
    .icon { fill: white; width: 30px; height: 30px; display: none; }
    .show { display: block; }

    /* AREA VIDEO */
    .video-area { flex: 1; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video-slot { width: 100%; height: 100%; object-fit: fill; }

    /* AREA RUNNING TEXT */
    .footer-area { width: 100%; height: 60px; background: #000; display: flex; align-items: center; justify-content: center; padding-bottom: 8px; }
    .ticker-frame { width: 98%; height: 45px; background: rgba(25, 25, 25, 0.9); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; overflow: hidden; display: flex; align-items: center; }
    
    .marquee-wrapper { display: flex; white-space: nowrap; animation: marquee-move 22s linear infinite; }
    .ticker-text { font-size: 24px; font-weight: bold; color: #fff; text-transform: uppercase; padding-right: 250px; }

    @keyframes marquee-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  </style>
</head>
<body>

  <div id="btn-control" onclick="handleFS()">
    <svg id="icon-fs" class="icon show" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    <svg id="icon-exit" class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </div>

  <div class="main-container">
    <div class="video-area">
      <video id="video-slot" muted playsinline loop></video>
    </div>
    <div class="footer-area">
      <div class="ticker-frame">
        <div class="marquee-wrapper">
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
          <span class="ticker-text">EASTON PARK RESIDENCE JATINANGOR</span>
        </div>
      </div>
    </div>
  </div>

<script>
  const VIDEO_NAME = "reminder%20(30%20x%2020%20cm)-2.mp4";
  const btn = document.getElementById('btn-control');
  const iconFs = document.getElementById('icon-fs');
  const iconExit = document.getElementById('icon-exit');
  const v = document.getElementById('video-slot');

  // FUNGSI UTAMA TOMBOL
  function handleFS() {
    if (!document.fullscreenElement) {
      enterFS();
    } else {
      exitFS();
    }
  }

  function enterFS() {
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    
    // Putar video
    if(!v.src) v.src = VIDEO_NAME + "?v=" + new Date().getTime();
    v.play();
    
    // Ganti Ikon ke EXIT (X)
    iconFs.classList.remove('show');
    iconExit.classList.add('show');
  }

  function exitFS() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    
    // Ganti Ikon ke FS (Kotak)
    iconExit.classList.remove('show');
    iconFs.classList.add('show');
  }

  // Deteksi jika user tekan ESC di keyboard/remote
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      iconExit.classList.remove('show');
      iconFs.classList.add('show');
    }
  });

  // AUTO REFRESH INSTAN (2 DETIK)
  let lastVer = "";
  function checkUpdate() {
    fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
      .then(res => {
        const ver = res.headers.get("Last-Modified") || res.headers.get("ETag");
        if (lastVer && ver && lastVer !== ver) location.reload(true);
        lastVer = ver;
      }).catch(() => {});
  }

  setInterval(checkUpdate, 2000);
  
  window.onload = () => {
    checkUpdate();
    v.src = VIDEO_NAME;
  };
</script>
</body>
</html>
